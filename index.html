<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학실 시약 현황판</title>

<!-- ═══════════════════════════════════════════════════════════════
     🔧 FIREBASE 설정 — 아래 값을 Firebase 콘솔에서 복사해 붙여넣으세요
     Firebase 콘솔 → 프로젝트 설정 → 일반 → 내 앱 → firebaseConfig
     ═══════════════════════════════════════════════════════════════ -->
<script>
  const FIREBASE_CONFIG = {
    apiKey:            "여기에-API-키를-입력하세요",
    authDomain:        "프로젝트ID.firebaseapp.com",
    databaseURL:       "https://프로젝트ID-default-rtdb.firebaseio.com",
    projectId:         "프로젝트ID",
    storageBucket:     "프로젝트ID.appspot.com",
    messagingSenderId: "숫자ID",
    appId:             "1:숫자:web:문자열"
  };

  // 학교명 (헤더에 표시됩니다)
  const SCHOOL_NAME = "광남고등학교 과학실";
</script>
<!-- ═══════════════════════════════════════════════════════════════ -->

<style>
/* ── Reset & Tokens ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Palette: 실험실 느낌의 딥 네이비 + 형광 민트 포인트 */
  --ink:       #0D1B2A;   /* 거의 검정 */
  --ink2:      #253547;
  --ink3:      #3D5166;
  --mid:       #647D96;
  --muted:     #9EB3C8;
  --line:      #D8E4EE;
  --surface:   #F2F7FC;
  --white:     #FFFFFF;

  --mint:      #00C9A7;   /* 포인트 — 실험실 형광색 */
  --mint-dim:  #00A588;
  --mint-bg:   #E6FAF7;

  --red:       #E84545;
  --red-bg:    #FEF0F0;
  --amber:     #F5A623;
  --amber-bg:  #FEF8EE;
  --blue:      #3B82F6;
  --blue-bg:   #EFF6FF;
  --violet:    #8B5CF6;
  --violet-bg: #F5F3FF;
  --rose:      #F43F5E;
  --rose-bg:   #FFF1F3;
  --teal:      #0D9488;
  --teal-bg:   #F0FDFA;

  --r: 10px;
  --r-sm: 6px;
  --sh: 0 1px 3px rgba(13,27,42,.08), 0 1px 2px rgba(13,27,42,.04);
  --sh-md: 0 4px 16px rgba(13,27,42,.10);

  --font: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', system-ui, sans-serif;
  --mono: 'SF Mono', 'Consolas', monospace;
}

html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── Header ──────────────────────────────────────────────── */
.hdr {
  background: var(--ink);
  color: var(--white);
  padding: 0 20px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-logo {
  background: var(--mint);
  color: var(--ink);
  font-weight: 800;
  font-size: 13px;
  padding: 4px 8px;
  border-radius: 5px;
  letter-spacing: -.3px;
}
.hdr-name { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
.hdr-sub  { font-size: 11px; color: var(--muted); }
.hdr-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .3s;
}
.dot.live { background: var(--mint); box-shadow: 0 0 0 3px rgba(0,201,167,.2); }

/* ── Tabs ─────────────────────────────────────────────────── */
.tabs {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  position: sticky;
  top: 58px;
  z-index: 100;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: none;
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--mid);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  font-family: var(--font);
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.tab-btn.on { color: var(--mint-dim); border-bottom-color: var(--mint); }
.tab-btn:hover:not(.on) { color: var(--ink3); }

/* ── Page panels ─────────────────────────────────────────── */
.page { display: none; padding: 20px; max-width: 960px; margin: 0 auto; }
.page.on { display: block; }

/* ── Stat strip ──────────────────────────────────────────── */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.stat {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 14px 16px;
  box-shadow: var(--sh);
  text-align: center;
}
.stat-n { font-size: 26px; font-weight: 700; color: var(--mint-dim); letter-spacing: -.5px; }
.stat-l { font-size: 11px; color: var(--mid); margin-top: 2px; }
.stat.warn .stat-n { color: var(--red); }
.stat.amber .stat-n { color: var(--amber); }
.stat.ok   .stat-n { color: var(--teal); }

/* ── Toolbar ─────────────────────────────────────────────── */
.toolbar {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 16px;
  box-shadow: var(--sh);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.search-row { display: flex; gap: 8px; align-items: center; }
.search-wrap {
  flex: 1;
  position: relative;
}
.search-ico {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
  opacity: .5;
}
.search-inp {
  width: 100%;
  padding: 9px 12px 9px 34px;
  border: 1.5px solid var(--line);
  border-radius: var(--r-sm);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  background: var(--surface);
  color: var(--ink);
  transition: border-color .15s;
}
.search-inp:focus { border-color: var(--mint); background: var(--white); }
.search-inp::placeholder { color: var(--muted); }

.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  border: 1.5px solid var(--line);
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  transition: all .13s;
  font-family: var(--font);
}
.chip.on {
  background: var(--mint);
  border-color: var(--mint);
  color: var(--ink);
  font-weight: 600;
}

/* ── Reagent Grid ─────────────────────────────────────────── */
.reagent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.r-card {
  background: var(--white);
  border: 1.5px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--sh);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .12s;
}
.r-card:hover {
  border-color: var(--mint);
  box-shadow: var(--sh-md);
  transform: translateY(-1px);
}
.r-card.danger { border-left: 4px solid var(--red); }
.r-card-top {
  padding: 14px 16px 10px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.r-name { font-size: 15px; font-weight: 700; color: var(--ink); letter-spacing: -.2px; }
.r-spec { font-size: 11px; color: var(--mid); margin-top: 2px; }
.badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: .2px;
}
.badge-danger  { background: var(--red-bg);    color: var(--red);    }
.badge-safe    { background: var(--mint-bg);   color: var(--mint-dim); }
.badge-cat-산염기  { background: var(--blue-bg);   color: var(--blue);   }
.badge-cat-산화제  { background: var(--rose-bg);   color: var(--rose);   }
.badge-cat-환원제  { background: var(--amber-bg);  color: var(--amber);  }
.badge-cat-유기용매 { background: var(--violet-bg); color: var(--violet); }
.badge-cat-금속염   { background: var(--teal-bg);   color: var(--teal);   }
.badge-cat-지시약   { background: #FDF4FF;          color: #A21CAF;       }
.badge-cat-표준용액 { background: #ECFDF5;          color: #065F46;       }
.badge-cat-기타    { background: var(--surface);    color: var(--mid);    }

.r-card-bot { padding: 10px 16px 14px; border-top: 1px solid var(--surface); }
.stock-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--mid);
  margin-bottom: 5px;
}
.stock-val { font-weight: 600; color: var(--ink); }
.bar-track {
  height: 5px;
  background: var(--line);
  border-radius: 3px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .4s ease;
}

/* ── Table (list view) ─────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1.5px solid var(--line);
  white-space: nowrap;
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #F9FCFF; }

/* ── Log Form ──────────────────────────────────────────────── */
.form-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--sh);
  overflow: hidden;
}
.form-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-head-icon {
  width: 28px; height: 28px;
  background: var(--mint-bg);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.form-body { padding: 20px; }
.fg-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg.full { grid-column: 1 / -1; }
.fg label { font-size: 11px; font-weight: 700; color: var(--ink3); letter-spacing: .04em; text-transform: uppercase; }
.fg input, .fg select, .fg textarea {
  padding: 9px 12px;
  border: 1.5px solid var(--line);
  border-radius: var(--r-sm);
  font-size: 13px;
  font-family: var(--font);
  color: var(--ink);
  background: var(--white);
  outline: none;
  transition: border-color .15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--mint); }
.fg textarea { resize: vertical; min-height: 70px; }
.form-foot {
  padding: 14px 20px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: var(--font);
  transition: all .13s;
}
.btn-mint   { background: var(--mint); color: var(--ink); }
.btn-mint:hover { background: var(--mint-dim); color: var(--white); }
.btn-ghost  { background: none; color: var(--mid); border: 1.5px solid var(--line); }
.btn-ghost:hover { background: var(--surface); color: var(--ink); }
.btn-sm     { padding: 6px 12px; font-size: 12px; }

/* ── Log history list ─────────────────────────────────────── */
.log-list { display: flex; flex-direction: column; gap: 0; }
.log-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}
.log-item:last-child { border-bottom: none; }
.log-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--mint);
  margin-top: 5px;
  flex-shrink: 0;
}
.log-body { flex: 1; min-width: 0; }
.log-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.log-meta  { font-size: 12px; color: var(--mid); margin-top: 2px; }
.log-amt   { font-size: 13px; font-weight: 700; color: var(--red); white-space: nowrap; }

/* ── Modal ───────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(13,27,42,.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 16px;
  backdrop-filter: blur(3px);
}
.overlay.h { display: none; }
.modal {
  background: var(--white);
  border-radius: var(--r);
  width: 100%; max-width: 440px;
  box-shadow: var(--sh-md);
  overflow: hidden;
  animation: rise .2s ease;
}
@keyframes rise { from { opacity: 0; transform: translateY(12px); } }
.modal-hdr {
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-hdr-title { font-size: 15px; font-weight: 700; }
.modal-x {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none; background: var(--surface);
  cursor: pointer; font-size: 16px; color: var(--mid);
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 18px; }
.modal-ftr {
  padding: 12px 18px;
  border-top: 1px solid var(--line);
  display: flex; gap: 8px; justify-content: flex-end;
}
.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  font-size: 13px;
}
.detail-row { display: flex; flex-direction: column; gap: 3px; }
.detail-key { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
.detail-val { font-weight: 600; color: var(--ink); }

/* ── Toast ───────────────────────────────────────────────── */
.toast-zone {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%);
  z-index: 3000; pointer-events: none;
  display: flex; flex-direction: column; gap: 8px;
  align-items: center;
}
.toast {
  padding: 10px 20px;
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 600;
  color: var(--white);
  box-shadow: var(--sh-md);
  opacity: 0;
  transform: translateY(8px);
  transition: all .22s;
  white-space: nowrap;
}
.toast.v  { opacity: 1; transform: none; }
.toast.ok    { background: var(--mint-dim); }
.toast.err   { background: var(--red); }
.toast.info  { background: var(--ink2); }

/* ── Empty ───────────────────────────────────────────────── */
.empty { text-align: center; padding: 52px 20px; color: var(--muted); }
.empty-ico { font-size: 42px; margin-bottom: 12px; }
.empty-txt { font-size: 14px; }
.empty-sub { font-size: 12px; margin-top: 5px; }

/* ── Spinner ─────────────────────────────────────────────── */
.loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 44px; color: var(--mid); font-size: 13px; }
.spin { width: 18px; height: 18px; border: 2px solid var(--line); border-top-color: var(--mint); border-radius: 50%; animation: sp .6s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }

/* ── View toggle ─────────────────────────────────────────── */
.view-btns { display: flex; gap: 4px; }
.view-btn {
  width: 32px; height: 32px;
  border: 1.5px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--white);
  color: var(--mid);
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .13s;
}
.view-btn.on { background: var(--mint-bg); border-color: var(--mint); color: var(--mint-dim); }

/* ── Section heading ─────────────────────────────────────── */
.sec-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
}
.sec-title { font-size: 13px; font-weight: 700; color: var(--ink3); }
.sec-count { font-size: 12px; color: var(--mid); }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 600px) {
  .page { padding: 12px; }
  .stat-strip { grid-template-columns: repeat(2, 1fr); }
  .reagent-grid { grid-template-columns: 1fr; }
  .hdr-sub { display: none; }
  .tab-btn { padding: 12px 14px; font-size: 12px; }
  .hide-xs { display: none !important; }
}
@media (max-width: 380px) {
  .stat-strip { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-n { font-size: 22px; }
}
</style>
</head>
<body>

<!-- ═══ HEADER ══════════════════════════════════════════ -->
<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">LAB</div>
    <div>
      <div class="hdr-name" id="hdr-school">과학실 시약 현황판</div>
      <div class="hdr-sub">Reagent Management System</div>
    </div>
  </div>
  <div class="hdr-status">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-txt">연결 중...</span>
  </div>
</header>

<!-- ═══ TABS ════════════════════════════════════════════ -->
<nav class="tabs">
  <button class="tab-btn on"  onclick="goto('board')">📊 현황판</button>
  <button class="tab-btn"     onclick="goto('table')">📋 목록표</button>
  <button class="tab-btn"     onclick="goto('log')">  ✏️ 사용 기록</button>
  <button class="tab-btn"     onclick="goto('hist')"> 🕒 기록 조회</button>
</nav>

<!-- ═══════════════════════════════════════════════════════
     PAGE 1 — 현황판 (카드 그리드)
════════════════════════════════════════════════════════ -->
<div class="page on" id="pg-board">

  <!-- Stats -->
  <div class="stat-strip">
    <div class="stat">
      <div class="stat-n" id="st-total">-</div>
      <div class="stat-l">전체 시약</div>
    </div>
    <div class="stat warn">
      <div class="stat-n" id="st-danger">-</div>
      <div class="stat-l">위험 물질</div>
    </div>
    <div class="stat amber">
      <div class="stat-n" id="st-low">-</div>
      <div class="stat-l">잔량 부족</div>
    </div>
    <div class="stat ok">
      <div class="stat-n" id="st-cats">-</div>
      <div class="stat-l">카테고리</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" class="search-inp" id="search1" placeholder="시약명 검색..." oninput="applyFilters()">
      </div>
      <div class="view-btns">
        <button class="view-btn on" id="vb-grid" onclick="setView('grid')" title="카드 보기">⊞</button>
        <button class="view-btn"    id="vb-list" onclick="setView('list')" title="목록 보기">☰</button>
      </div>
    </div>
    <div class="chip-row" id="chips1"></div>
  </div>

  <!-- Content -->
  <div class="sec-head">
    <span class="sec-title">시약 목록</span>
    <span class="sec-count" id="visible-count"></span>
  </div>
  <div id="board-content">
    <div class="loading"><div class="spin"></div> 데이터 불러오는 중...</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     PAGE 2 — 목록표 (테이블)
════════════════════════════════════════════════════════ -->
<div class="page" id="pg-table">
  <div class="toolbar">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" class="search-inp" id="search2" placeholder="시약명 검색..." oninput="applyFilters()">
      </div>
    </div>
    <div class="chip-row" id="chips2"></div>

<!-- ════════════════════════════════════════════════════════
     Firebase SDK  (compat)
════════════════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
/* ─────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────── */
let db         = null;
let reagents   = {};   // key → reagent obj
let logs       = {};   // key → log obj
let activeFilter = '전체';
let viewMode   = 'grid';  // 'grid' | 'list'
let openedId   = null;

const CATS = ['전체','산/염기','산화제','환원제','유기용매','금속/염','지시약','표준용액','기타'];

/* ─────────────────────────────────────────────────────────
   BOOT
───────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  setTodayDate();
  document.getElementById('hdr-school').textContent = SCHOOL_NAME;
  bootFirebase();
});

function setTodayDate() {
  document.getElementById('l-date').value = new Date().toISOString().slice(0,10);
}

/* ─────────────────────────────────────────────────────────
   FIREBASE
───────────────────────────────────────────────────────── */
function bootFirebase() {
  const cfg = FIREBASE_CONFIG;
  const missing = ['apiKey','authDomain','databaseURL','projectId'].filter(k => !cfg[k] || cfg[k].includes('여기에') || cfg[k].includes('프로젝트ID'));
  if (missing.length) {
    setConn(false);
    toast('⚠ 파일 상단의 FIREBASE_CONFIG를 입력해 주세요.', 'err');
    useDemoData();
    return;
  }
  try {
    const app = firebase.initializeApp(cfg);
    db = firebase.database(app);
    db.ref('.info/connected').on('value', s => setConn(s.val() === true));
    listenReagents();
    listenLogs();
  } catch(e) {
    setConn(false);
    toast('Firebase 연결 실패: ' + e.message, 'err');
    useDemoData();
  }
}

function setConn(ok) {
  document.getElementById('conn-dot').className = 'dot' + (ok ? ' live' : '');
  document.getElementById('conn-txt').textContent = ok ? '실시간 연결됨' : '오프라인';
}

function listenReagents() {
  db.ref('reagents').on('value', snap => {
    reagents = snap.val() || {};
    applyFilters();
    updateStats();
    populateSelect();
  });
}

function listenLogs() {
  db.ref('logs').orderByChild('date').on('value', snap => {
    logs = snap.val() || {};
    renderHist(null);
  });
}

/* ─────────────────────────────────────────────────────────
   DEMO DATA (Firebase 미연결 시)
───────────────────────────────────────────────────────── */
function useDemoData() {
  reagents = {
    demo1: { name:'염산 (HCl)',         spec:'500mL, 35%',  category:'산/염기',  amount:'320mL', max:'500mL', danger:true,  location:'시약장 A-1' },
    demo2: { name:'수산화나트륨 (NaOH)', spec:'1kg',         category:'산/염기',  amount:'650g',  max:'1000g', danger:true,  location:'시약장 A-2' },
    demo3: { name:'페놀프탈레인',        spec:'100mL',       category:'지시약',   amount:'80mL',  max:'100mL', danger:false, location:'시약장 B-1' },
    demo4: { name:'에탄올',             spec:'4L, 95%',     category:'유기용매', amount:'800mL', max:'4000mL',danger:true,  location:'시약장 C-1' },
    demo5: { name:'황산구리 (II)',       spec:'500g',        category:'금속/염',  amount:'120g',  max:'500g',  danger:false, location:'시약장 D-2' },
    demo6: { name:'과산화수소 (H₂O₂)',  spec:'1L, 30%',     category:'산화제',   amount:'50mL',  max:'1000mL',danger:true,  location:'시약장 A-4' },
    demo7: { name:'에탄산 (CH₃COOH)',   spec:'500mL, 빙초산',category:'산/염기', amount:'480mL', max:'500mL', danger:false, location:'시약장 A-3' },
    demo8: { name:'옥살산 표준용액',    spec:'500mL, 0.1M', category:'표준용액', amount:'380mL', max:'500mL', danger:false, location:'냉장고 1단' },
  };
  logs = {
    lg1: { reagentId:'demo1', reagentName:'염산 (HCl)', date:'2025-06-10', used:'30mL', user:'김용조', exp:'산-염기 중화 적정', class:'2학년 3반', waste:'중화 후 폐기' },
    lg2: { reagentId:'demo3', reagentName:'페놀프탈레인', date:'2025-06-10', used:'2mL', user:'김동현', exp:'산-염기 중화 적정', class:'1학년 2반', waste:'폐액통 수거' },
    lg3: { reagentId:'demo6', reagentName:'과산화수소 (H₂O₂)', date:'2025-06-05', used:'50mL', user:'김용조', exp:'산소 발생 실험', class:'1학년 1반', waste:'폐액통 수거', note:'거품 다량 발생' },
  };
  applyFilters();
  updateStats();
  populateSelect();
  renderHist(null);
}

/* ─────────────────────────────────────────────────────────
   TABS
───────────────────────────────────────────────────────── */
const PAGES = { board:'pg-board', table:'pg-table', log:'pg-log', hist:'pg-hist' };
function goto(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(PAGES[id]).classList.add('on');
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('on', ['board','table','log','hist'][i] === id);
  });
}

/* ─────────────────────────────────────────────────────────
   STATS
───────────────────────────────────────────────────────── */
function updateStats() {
  const list = Object.values(reagents);
  document.getElementById('st-total').textContent  = list.length;
  document.getElementById('st-danger').textContent = list.filter(r => r.danger == true || r.danger === 'true').length;
  document.getElementById('st-low').textContent    = list.filter(r => stockPct(r) !== null && stockPct(r) < 0.25).length;
  document.getElementById('st-cats').textContent   = new Set(list.map(r=>r.category).filter(Boolean)).size;
}

function stockPct(r) {
  const a = parseFloat(r.amount), m = parseFloat(r.max);
  return (!isNaN(a) && !isNaN(m) && m>0) ? a/m : null;
}

/* ─────────────────────────────────────────────────────────
   CHIPS
───────────────────────────────────────────────────────── */
function buildChips(containerId) {
  const usedCats = ['전체', ...new Set(Object.values(reagents).map(r=>r.category).filter(Boolean))];
  const el = document.getElementById(containerId);
  el.innerHTML = usedCats.map(c =>
    `<button class="chip${c===activeFilter?' on':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  applyFilters();
}

/* ─────────────────────────────────────────────────────────
   VIEW TOGGLE
───────────────────────────────────────────────────────── */
function setView(v) {
  viewMode = v;
  document.getElementById('vb-grid').classList.toggle('on', v==='grid');
  document.getElementById('vb-list').classList.toggle('on', v==='list');
  renderBoard();
}

/* ─────────────────────────────────────────────────────────
   FILTERS → RENDER
───────────────────────────────────────────────────────── */
function applyFilters() {
  buildChips('chips1');
  buildChips('chips2');

  const q1 = (document.getElementById('search1').value||'').toLowerCase();
  const q2 = (document.getElementById('search2').value||'').toLowerCase();
  const q  = q1 || q2;

  const filtered = Object.entries(reagents).filter(([,r]) => {
    const catOk = activeFilter==='전체' || r.category===activeFilter;
    const qOk   = !q || (r.name||'').toLowerCase().includes(q) || (r.spec||'').toLowerCase().includes(q);
    return catOk && qOk;
  });

  renderBoard(filtered);
  renderTable(filtered);
}

/* ─────────────────────────────────────────────────────────
   BOARD (카드 / 목록)
───────────────────────────────────────────────────────── */
function renderBoard(entries) {
  if (!entries) entries = Object.entries(reagents);
  const cnt = document.getElementById('visible-count');
  cnt.textContent = entries.length + '종';

  const wrap = document.getElementById('board-content');
  if (!entries.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-ico">🔬</div><div class="empty-txt">해당 시약이 없습니다</div><div class="empty-sub">검색어나 필터를 바꿔보세요</div></div>`;
    return;
  }

  if (viewMode === 'grid') {
    wrap.innerHTML = `<div class="reagent-grid">${entries.map(([id,r]) => cardHTML(id,r)).join('')}</div>`;
  } else {
    // list mode inside board
    wrap.innerHTML = `
      <div style="background:var(--white);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;">
        <div class="tbl-wrap"><table>
          <thead><tr>
            <th>시약명</th><th class="hide-xs">규격</th><th>카테고리</th><th>잔량</th><th class="hide-xs">위험</th>
          </tr></thead>
          <tbody>${entries.map(([id,r]) => tblRowHTML(id,r)).join('')}</tbody>
        </table></div>
      </div>`;
  }
}

function cardHTML(id, r) {
  const danger = r.danger==true || r.danger==='true';
  const pct = stockPct(r);
  const pctVal = pct !== null ? Math.round(pct*100) : null;
  const barColor = pct===null ? 'var(--mint)' : pct<0.25 ? 'var(--red)' : pct<0.55 ? 'var(--amber)' : 'var(--mint)';
  const catKey = (r.category||'기타').replace(/\//g,'');
  return `
    <div class="r-card${danger?' danger':''}" onclick="openDetail('${id}')">
      <div class="r-card-top">
        <div>
          <div class="r-name">${r.name||'-'}</div>
          <div class="r-spec">${r.spec||'규격 미입력'}${r.location?'  ·  '+r.location:''}</div>
        </div>
        <div class="badges">
          ${danger ? '<span class="badge badge-danger">⚠ 위험</span>' : '<span class="badge badge-safe">✓ 안전</span>'}
          <span class="badge badge-cat-${catKey}">${r.category||'-'}</span>
        </div>
      </div>
      <div class="r-card-bot">
        <div class="stock-label">
          <span>잔량</span>
          <span class="stock-val">${r.amount||'-'}${pctVal!==null?'  ('+pctVal+'%)':''}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pctVal!==null?pctVal:100}%;background:${barColor}"></div>
        </div>
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────────────
   TABLE
───────────────────────────────────────────────────────── */
function renderTable(entries) {
  if (!entries) entries = Object.entries(reagents);
  const tbody = document.getElementById('tbl-body');
  if (!entries.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-ico">🔬</div><div class="empty-txt">시약 없음</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = entries.map(([id,r]) => tblRowHTML(id,r)).join('');
}

function tblRowHTML(id, r) {
  const danger = r.danger==true||r.danger==='true';
  const pct = stockPct(r);
  const pctVal = pct!==null ? Math.round(pct*100) : null;
  const barColor = pct===null?'var(--mint)':pct<0.25?'var(--red)':pct<0.55?'var(--amber)':'var(--mint)';
  const catKey = (r.category||'기타').replace(/\//g,'');
  const stockBar = pctVal!==null
    ? `<div style="display:flex;align-items:center;gap:6px;min-width:90px;">
        <div class="bar-track" style="flex:1;"><div class="bar-fill" style="width:${pctVal}%;background:${barColor}"></div></div>
        <span style="font-size:11px;color:var(--mid);white-space:nowrap;">${pctVal}%</span>
       </div>`
    : '<span style="color:var(--muted);font-size:12px;">-</span>';
  return `<tr style="cursor:pointer;" onclick="openDetail('${id}')">
    <td><strong>${r.name||'-'}</strong>${r.location?`<br><span style="font-size:11px;color:var(--muted)">${r.location}</span>`:''}</td>
    <td class="hide-xs" style="color:var(--mid);font-size:12px;">${r.spec||'-'}</td>
    <td><span class="badge badge-cat-${catKey}">${r.category||'-'}</span></td>
    <td style="font-size:13px;font-weight:600;">${r.amount||'-'}</td>
    <td>${stockBar}</td>
    <td class="hide-xs">${danger?'<span class="badge badge-danger">⚠ 위험</span>':'<span class="badge badge-safe">안전</span>'}</td>
    <td onclick="event.stopPropagation()"><button class="btn btn-ghost btn-sm" onclick="quickLog('${id}')">기록</button></td>
  </tr>`;
}

/* ─────────────────────────────────────────────────────────
   DETAIL MODAL
───────────────────────────────────────────────────────── */
function openDetail(id) {
  const r = reagents[id]; if(!r) return;
  openedId = id;
  const danger = r.danger==true||r.danger==='true';
  document.getElementById('md-name').textContent = r.name||'-';
  document.getElementById('md-grid').innerHTML = [
    ['규격', r.spec||'-'],
    ['카테고리', r.category||'-'],
    ['현재 잔량', r.amount||'-'],
    ['최대 용량', r.max||'-'],
    ['보관 위치', r.location||'-'],
    ['GHS 등급', r.ghs||'-'],
    ['위험 여부', danger?'⚠ 위험 물질':'안전'],
    ['비고', r.note||'-'],
  ].map(([k,v]) => `<div class="detail-row"><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`).join('');
  document.getElementById('md-log-btn').onclick = () => { closeModal('ov-detail'); quickLog(id); };
  document.getElementById('ov-detail').classList.remove('h');
}

function closeModal(id) { document.getElementById(id).classList.add('h'); }

/* ─────────────────────────────────────────────────────────
   AMOUNT CALC HELPERS
   parseAmount("325.5mL") → { num: 325.5, unit: "mL", raw: "325.5mL" }
───────────────────────────────────────────────────────── */
function parseAmount(str) {
  if (!str) return null;
  const s = String(str).trim();
  const m = s.match(/^([\d.]+)\s*([a-zA-Zㄱ-힣μµ%]*)/);
  if (!m || isNaN(parseFloat(m[1]))) return null;
  return { num: parseFloat(m[1]), unit: m[2] || '', raw: s };
}

function calcRemain(currentStr, usedStr) {
  const cur  = parseAmount(currentStr);
  const used = parseAmount(usedStr);
  if (!cur || !used) return null;
  const result = Math.round((cur.num - used.num) * 1000) / 1000;
  const unit = cur.unit || used.unit || '';
  return { num: result, unit, str: result + (unit ? unit : '') };
}

/* ─────────────────────────────────────────────────────────
   LOG FORM
───────────────────────────────────────────────────────── */
function populateSelect() {
  const sel = document.getElementById('l-reagent');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 시약을 선택하세요 --</option>' +
    Object.entries(reagents).map(([id, r]) =>
      `<option value="${id}">${r.name}${r.amount ? ' (' + r.amount + ')' : ''}</option>`
    ).join('');
  if (cur) { sel.value = cur; onReagentChange(); }
}

function onReagentChange() {
  const rid = document.getElementById('l-reagent').value;
  const r   = reagents[rid];
  const curEl    = document.getElementById('l-current');
  const badge    = document.getElementById('l-unit-badge');
  const msgEl    = document.getElementById('l-calc-msg');
  const remainEl = document.getElementById('l-remain');

  if (!r || !r.amount) {
    curEl.value = '';
    curEl.placeholder = '시약을 선택하면 자동 표시';
    badge.style.display = 'none';
    msgEl.textContent = '';
    remainEl.value = '';
    document.getElementById('l-calc-icon').style.display = 'none';
    return;
  }

  curEl.value = r.amount;
  const parsed = parseAmount(r.amount);
  if (parsed && parsed.unit) {
    badge.textContent = parsed.unit;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
  // 시약 바꾸면 사용량 기반으로 재계산
  autoCalcRemain();
}

function autoCalcRemain() {
  const rid      = document.getElementById('l-reagent').value;
  const r        = rid ? reagents[rid] : null;
  const usedStr  = document.getElementById('l-used').value.trim();
  const remainEl = document.getElementById('l-remain');
  const msgEl    = document.getElementById('l-calc-msg');
  const iconEl   = document.getElementById('l-calc-icon');

  if (!r || !r.amount || !usedStr) {
    // 사용량만 지워도 메시지 초기화 (수동 입력값은 건드리지 않음)
    if (!usedStr) { msgEl.textContent = ''; iconEl.style.display = 'none'; }
    return;
  }

  const result = calcRemain(r.amount, usedStr);
  if (!result) {
    msgEl.innerHTML = '<span style="color:var(--amber)">⚠ 숫자를 인식하지 못했습니다 (예: 25 또는 25mL)</span>';
    iconEl.style.display = 'none';
    return;
  }
  if (result.num < 0) {
    msgEl.innerHTML = `<span style="color:var(--red)">⚠ 사용량(${usedStr})이 현재 잔량(${r.amount})보다 많습니다</span>`;
    iconEl.style.display = 'none';
    return;
  }

  remainEl.value = result.str;
  remainEl.style.background = 'var(--mint-bg)';
  remainEl.style.color      = 'var(--mint-dim)';
  iconEl.style.display      = '';
  iconEl.style.color        = 'var(--mint-dim)';

  const pct = parseAmount(r.amount) ? Math.round(result.num / parseAmount(r.amount).num * 100) : null;
  const pctColor = pct !== null ? (pct < 25 ? 'var(--red)' : pct < 55 ? 'var(--amber)' : 'var(--mint-dim)') : 'var(--ink3)';
  msgEl.innerHTML = `<span style="color:${pctColor}">
    ${r.amount} → <strong>${result.str}</strong>${pct !== null ? ` (잔량 ${pct}%)` : ''}
  </span>`;
}

function onRemainManual() {
  // 사용자가 직접 수정하면 자동계산 스타일 제거
  const el = document.getElementById('l-remain');
  el.style.background = '';
  el.style.color      = '';
  document.getElementById('l-calc-icon').style.display = 'none';
  document.getElementById('l-calc-msg').textContent = '';
}

function quickLog(id) {
  goto('log');
  setTimeout(() => {
    document.getElementById('l-reagent').value = id;
    onReagentChange();
  }, 50);
}

function submitLog() {
  if (!db) { toast('Firebase 미연결 — 데모 모드에서는 저장 불가', 'err'); return; }
  const rid   = document.getElementById('l-reagent').value;
  const date  = document.getElementById('l-date').value;
  const used  = document.getElementById('l-used').value.trim();
  const user  = document.getElementById('l-user').value.trim();
  const exp   = document.getElementById('l-exp').value.trim();
  if (!rid || !date || !used || !user || !exp) {
    toast('* 표시 필드를 모두 입력해 주세요.', 'err'); return;
  }

  // 잔량: 자동계산값 우선, 없으면 수동입력값
  let remain = document.getElementById('l-remain').value.trim();
  if (!remain) {
    const r = reagents[rid];
    if (r?.amount) {
      const calc = calcRemain(r.amount, used);
      if (calc && calc.num >= 0) remain = calc.str;
    }
  }

  const entry = {
    reagentId:    rid,
    reagentName:  reagents[rid]?.name || '',
    date, used, user, exp,
    remainAfter:  remain,
    class:  document.getElementById('l-class').value.trim(),
    waste:  document.getElementById('l-waste').value,
    note:   document.getElementById('l-note').value.trim(),
    createdAt: new Date().toISOString()
  };

  const updates = {};
  const newKey  = db.ref('logs').push().key;
  updates['logs/' + newKey] = entry;
  if (remain && rid) updates['reagents/' + rid + '/amount'] = remain;

  db.ref().update(updates)
    .then(() => { toast('사용 기록 저장 완료 ✓', 'ok'); resetLog(); })
    .catch(e => toast('저장 실패: ' + e.message, 'err'));
}

function resetLog() {
  ['l-used', 'l-exp', 'l-class', 'l-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('l-reagent').value = '';
  document.getElementById('l-waste').value   = '미처리';
  // 잔량 필드 및 계산 UI 초기화
  const remainEl = document.getElementById('l-remain');
  remainEl.value          = '';
  remainEl.style.background = '';
  remainEl.style.color      = '';
  document.getElementById('l-current').value = '';
  document.getElementById('l-unit-badge').style.display = 'none';
  document.getElementById('l-calc-icon').style.display  = 'none';
  document.getElementById('l-calc-msg').textContent     = '';
  setTodayDate();
}

/* ─────────────────────────────────────────────────────────
   HISTORY
───────────────────────────────────────────────────────── */
function renderHist(filtered) {
  const data = filtered ?? logs;
  const entries = Object.entries(data).sort((a,b) => (b[1].date||'').localeCompare(a[1].date||''));
  const wrap = document.getElementById('hist-wrap');
  if (!entries.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">기록이 없습니다</div></div>`;
    return;
  }
  wrap.innerHTML = `<div class="log-list">${entries.map(([,l]) => `
    <div class="log-item">
      <div class="log-dot"></div>
      <div class="log-body">
        <div class="log-title">${l.reagentName||'-'} — ${l.exp||'-'}</div>
        <div class="log-meta">${l.date} · ${l.user}${l.class?' · '+l.class:''} · 폐액: ${l.waste||'-'}${l.note?' · <span style="color:var(--red)">⚠ '+l.note+'</span>':''}</div>
      </div>
      <div class="log-amt">−${l.used}</div>
    </div>`).join('')}</div>`;
}

function filterHist() {
  const from = document.getElementById('h-from').value;
  const to   = document.getElementById('h-to').value;
  if (!from && !to) { renderHist(null); return; }
  const f = Object.fromEntries(
    Object.entries(logs).filter(([,l]) => {
      if (from && l.date < from) return false;
      if (to   && l.date > to)   return false;
      return true;
    })
  );
  renderHist(f);
}

/* ─────────────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────────────── */
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('tz').appendChild(el);
  requestAnimationFrame(() => el.classList.add('v'));
  setTimeout(() => { el.classList.remove('v'); setTimeout(() => el.remove(), 280); }, 2800);
}

/* close modal on backdrop click */
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target === o) o.classList.add('h'); });
});
</script>
